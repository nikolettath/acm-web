<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      @keyframes pulse-node {
        0%, 100% { opacity: 0.5; r: 6px; }
        50% { opacity: 1; r: 9px; }
      }
      .circuit-line { stroke: rgba(212, 83, 79, 0.4); stroke-width: 2; fill: none; }
      .circuit-node { fill: rgba(212, 83, 79, 0.6); }
      .node-glow { animation: pulse-node 4s infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="1400" height="900" fill="#4a0404"/>
  
  <!-- Subtle gradient overlay for depth -->
  <defs>
    <radialGradient id="bg-glow" cx="35%" cy="45%">
      <stop offset="0%" style="stop-color:#6b2a2a;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#4a0404;stop-opacity:0" />
    </radialGradient>
  </defs>
  <rect width="1400" height="900" fill="url(#bg-glow)"/>
  
  <!-- Circuit Lines - Layer 1 (Diagonal flowing paths) -->
  <g opacity="0.45">
    <line x1="50" y1="100" x2="250" y2="200" class="circuit-line"/>
    <line x1="250" y1="200" x2="450" y2="150" class="circuit-line"/>
    <line x1="450" y1="150" x2="650" y2="250" class="circuit-line"/>
    <line x1="650" y1="250" x2="850" y2="180" class="circuit-line"/>
    <line x1="850" y1="180" x2="1050" y2="280" class="circuit-line"/>
    <line x1="1050" y1="280" x2="1250" y2="200" class="circuit-line"/>
    <line x1="1250" y1="200" x2="1350" y2="300" class="circuit-line"/>
    
    <line x1="100" y1="350" x2="300" y2="420" class="circuit-line"/>
    <line x1="300" y1="420" x2="500" y2="380" class="circuit-line"/>
    <line x1="500" y1="380" x2="700" y2="480" class="circuit-line"/>
    <line x1="700" y1="480" x2="900" y2="420" class="circuit-line"/>
    <line x1="900" y1="420" x2="1100" y2="520" class="circuit-line"/>
    <line x1="1100" y1="520" x2="1300" y2="450" class="circuit-line"/>
    
    <line x1="80" y1="600" x2="280" y2="680" class="circuit-line"/>
    <line x1="280" y1="680" x2="480" y2="630" class="circuit-line"/>
    <line x1="480" y1="630" x2="680" y2="730" class="circuit-line"/>
    <line x1="680" y1="730" x2="880" y2="670" class="circuit-line"/>
    <line x1="880" y1="670" x2="1080" y2="770" class="circuit-line"/>
    <line x1="1080" y1="770" x2="1280" y2="700" class="circuit-line"/>
  </g>
  
  <!-- Circuit Lines - Layer 2 (Vertical and connecting paths) -->
  <g opacity="0.4">
    <line x1="200" y1="80" x2="200" y2="280" class="circuit-line"/>
    <line x1="400" y1="120" x2="400" y2="320" class="circuit-line"/>
    <line x1="600" y1="100" x2="600" y2="300" class="circuit-line"/>
    <line x1="800" y1="140" x2="800" y2="340" class="circuit-line"/>
    <line x1="1000" y1="110" x2="1000" y2="310" class="circuit-line"/>
    <line x1="1200" y1="150" x2="1200" y2="350" class="circuit-line"/>
    
    <line x1="250" y1="350" x2="250" y2="550" class="circuit-line"/>
    <line x1="450" y1="380" x2="450" y2="580" class="circuit-line"/>
    <line x1="650" y1="360" x2="650" y2="560" class="circuit-line"/>
    <line x1="850" y1="400" x2="850" y2="600" class="circuit-line"/>
    <line x1="1050" y1="370" x2="1050" y2="570" class="circuit-line"/>
    <line x1="1250" y1="410" x2="1250" y2="610" class="circuit-line"/>
    
    <line x1="220" y1="600" x2="220" y2="800" class="circuit-line"/>
    <line x1="420" y1="630" x2="420" y2="830" class="circuit-line"/>
    <line x1="620" y1="610" x2="620" y2="810" class="circuit-line"/>
    <line x1="820" y1="650" x2="820" y2="850" class="circuit-line"/>
    <line x1="1020" y1="620" x2="1020" y2="820" class="circuit-line"/>
    <line x1="1220" y1="660" x2="1220" y2="860" class="circuit-line"/>
  </g>
  
  <!-- Connection Nodes - Static background layer -->
  <g opacity="0.5">
    <circle cx="250" cy="200" r="5" class="circuit-node"/>
    <circle cx="450" cy="150" r="4" class="circuit-node"/>
    <circle cx="650" cy="250" r="5" class="circuit-node"/>
    <circle cx="850" cy="180" r="4" class="circuit-node"/>
    <circle cx="1050" cy="280" r="5" class="circuit-node"/>
    <circle cx="1250" cy="200" r="4" class="circuit-node"/>
    
    <circle cx="300" cy="420" r="5" class="circuit-node"/>
    <circle cx="500" cy="380" r="4" class="circuit-node"/>
    <circle cx="700" cy="480" r="5" class="circuit-node"/>
    <circle cx="900" cy="420" r="4" class="circuit-node"/>
    <circle cx="1100" cy="520" r="5" class="circuit-node"/>
    <circle cx="1300" cy="450" r="4" class="circuit-node"/>
    
    <circle cx="280" cy="680" r="5" class="circuit-node"/>
    <circle cx="480" cy="630" r="4" class="circuit-node"/>
    <circle cx="680" cy="730" r="5" class="circuit-node"/>
    <circle cx="880" cy="670" r="4" class="circuit-node"/>
    <circle cx="1080" cy="770" r="5" class="circuit-node"/>
    <circle cx="1280" cy="700" r="4" class="circuit-node"/>
    
    <circle cx="200" cy="280" r="3.5" class="circuit-node"/>
    <circle cx="400" cy="320" r="3.5" class="circuit-node"/>
    <circle cx="600" cy="300" r="3.5" class="circuit-node"/>
    <circle cx="800" cy="340" r="3.5" class="circuit-node"/>
    <circle cx="1000" cy="310" r="3.5" class="circuit-node"/>
    <circle cx="1200" cy="350" r="3.5" class="circuit-node"/>
  </g>
  
  <!-- Animated glowing nodes - High visibility -->
  <g filter="url(#glow)">
    <circle cx="250" cy="200" r="6" class="circuit-node node-glow" style="fill: rgba(212, 83, 79, 0.85);"/>
    <circle cx="700" cy="480" r="6" class="circuit-node node-glow" style="fill: rgba(212, 83, 79, 0.85); animation-delay: 1s;"/>
    <circle cx="1050" cy="280" r="6" class="circuit-node node-glow" style="fill: rgba(212, 83, 79, 0.85); animation-delay: 2s;"/>
    <circle cx="480" cy="630" r="6" class="circuit-node node-glow" style="fill: rgba(212, 83, 79, 0.85); animation-delay: 1.5s;"/>
  </g>
</svg>
